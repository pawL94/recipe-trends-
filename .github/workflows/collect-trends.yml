name: Collect Recipe Trends

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Trends sammeln
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/collect_trends.py

      - name: trends.json committen und pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Trend Bot"
          git add trends.json
          git diff --staged --quiet || git commit -m "Trends aktualisiert $(date '+%d.%m.%Y')"
          git push
